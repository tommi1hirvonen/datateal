name: pre-commit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - uses: pre-commit/action@v3.0.0
